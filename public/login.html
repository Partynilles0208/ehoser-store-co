<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ehoser Zugang</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body class="lock-body">
    <main class="lock-shell">
      <section class="lock-panel">
        <div class="brand-mark">E</div>
        <p class="eyebrow">Privater Studio-Zugang</p>
        <h1>Ehoser</h1>
        <p class="muted">Spielunternehmen, Trailer, Releases und Downloads.</p>
        <form id="accessForm" class="code-form">
          <input id="code" name="code" inputmode="numeric" autocomplete="one-time-code" placeholder="Zugangscode" required />
          <button type="submit">Freischalten</button>
        </form>
        <p id="message" class="form-message"></p>
      </section>
    </main>
    <script src="/assets/login.js"></script>
  </body>
</html>
