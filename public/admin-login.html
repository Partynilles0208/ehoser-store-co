<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ehoser Admin</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body class="lock-body admin-lock">
    <main class="lock-shell">
      <section class="lock-panel compact">
        <div class="brand-mark">A</div>
        <p class="eyebrow">Ehoser Verwaltung</p>
        <h1>Admin</h1>
        <form id="adminAccessForm" class="code-form">
          <input id="code" name="code" type="password" autocomplete="current-password" placeholder="Admin-Code" required />
          <button type="submit">Einloggen</button>
        </form>
        <p id="message" class="form-message"></p>
      </section>
    </main>
    <script src="/assets/admin-login.js"></script>
  </body>
</html>
